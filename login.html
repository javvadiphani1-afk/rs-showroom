<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Saree Billing Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="CSS/style.css" />
</head>
<body class="login-body">
  <div class="login-wrapper">
    <div class="login-box">
      <img src="https://www.image2url.com/r2/default/images/1778478894381-73e87991-c1e5-49b6-b762-98cdb4b3d4cd.png" alt="Logo" class="logo" />
      <h2>Saree Billing Login</h2>
      <p class="login-subtitle">Sign in to manage your Ramu Saree Showroom bills.</p>

      <form id="login-form">
        <div class="field">
          <label for="userId">User ID</label>
          <input type="text" id="userId" required />
        </div>

        <div class="field">
          <label for="password">Password</label>
          <input type="password" id="password" required />
        </div>

        <button type="submit" class="primary-btn">Login</button>
        <p id="login-error" class="error"></p>
      </form>
    </div>
  </div>

  <!-- Login Logic -->
  <script src="JS/auth.js"></script>
</body>
</html>
